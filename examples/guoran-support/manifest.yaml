apiVersion: solution.ai/v1alpha1
kind: Solution
metadata:
  name: guoran-support-agent
  version: 0.1.0
  owner: fde-zhouyuan
  industry: beverage

perception:
  sensors:
    - id: guoran_ticket_webhook
      ref: "@world2agent/sensor-webhook@1.0.0"
      signalTypes:
        - ticket.created
      config:
        endpointPath: /w2a/guoran-tickets
        authTokenRef: env:GUORAN_TICKET_WEBHOOK_TOKEN
  triggers:
    - id: guoran_ticket_triage
      sensor: guoran_ticket_webhook
      signalType: ticket.created
      routeTo: support_agent

knowledge:
  sources:
    - id: guoran_manuals
      type: jsonl
      uri: ./data/guoran/knowledge_units.jsonl
      schema: faq
  schemas:
    - id: faq
      fields:
        - question
        - answer
        - product_model
        - source_ref
  qualityGates:
    - type: missing_required_fields
      severity: block
      scope:
        - faq

components:
  - id: intent_classifier
    category: processor
    ref: registry.intent.beverage-router@1.0.0
    config:
      intents:
        - troubleshooting
        - warranty
        - complaint
        - human_handoff
  - id: retriever
    category: processor
    ref: registry.retriever.local-keyword@1.0.0
    config:
      topK: 5
      requireCitation: true
  - id: answer_generator
    category: processor
    ref: registry.agent.cited-answer@1.2.0
    config:
      style: concise
      requireGrounding: true
  - id: create_ticket
    category: action
    ref: registry.action.mock-create-service-ticket@1.0.0
    config:
      system: guoran-ticket-system
      apiKeyRef: env:GUORAN_TICKET_API_KEY
  - id: human_handoff
    category: action
    ref: registry.action.human-handoff@1.0.0
    config:
      queue: guoran-support-l2

workflow:
  entrypoint: support_agent
  onError:
    retry: 1
    fallbackNode: handoff
  inputMapping:
    chat:
      message: request.message
    w2a_signal:
      message: signal.source_event.data.description
      ticketId: signal.source_event.data.ticketId
      productModel: signal.source_event.data.productModel
      signalSummary: signal.event.summary
  nodes:
    - id: classify_intent
      component: intent_classifier
      inputs:
        message: inputs.message
    - id: retrieve_knowledge
      component: retriever
      inputs:
        query: inputs.message
    - id: generate_answer
      component: answer_generator
      inputs:
        message: inputs.message
        passages: retrieve_knowledge.passages
        citations: retrieve_knowledge.citations
    - id: handoff
      component: human_handoff
      when: classify_intent.confidence < 0.65
      inputs:
        message: inputs.message

runtime:
  knowledgeBindings:
    - component: retriever
      sources:
        - guoran_manuals
  modelPolicy:
    defaultModel: gpt-4.1
    fallbackModel: gpt-4.1-mini
    maxLatencyMs: 8000
    maxCostPerRunUsd: 0.05
  observability:
    trace: required
    logInputs: masked
    logOutputs: true
    retainDays: 7

evaluation:
  datasets:
    - id: guoran_golden_cases
      uri: ./data/guoran/eval_cases.jsonl
      caseFormat: runtime_request_jsonl
  metrics:
    - citation_coverage
    - answer_accuracy
  gates:
    - metric: citation_coverage
      min: 0.95
      severity: block
      schedule: onRelease

delivery:
  environments:
    - name: poc
      type: shared_sandbox
      config:
        modelKeyRef: env:OPENAI_API_KEY
        tracePath: ./.solution/traces
        retainDays: 7
  security:
    piiDetection: required
    promptInjectionDefense: required
    rbac: required
  releaseChecks:
    - model_credentials_configured
    - sensor_credentials_configured
    - action_credentials_configured
    - observability_enabled
    - security_baseline_passed
